# Full coupled EERIE recipe with regridding to O96
# Atmosphere (surface + upper-air) + Ocean + Accumulated + Forcings
# Based on reference: aifs-ea-an-oper-0001-mars-o96-1979-2023-6h-v8

name: eerie-ifs-fesom-hist1950-o96

dates:
  start: "1970-01-01T06:00:00"
  end: "2014-12-31T18:00:00"
  frequency: 6h

input:
  join:
    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.2D_6hourly_instant
        param:
          - 10u
          - 10v
          - 2d
          - 2t
          - msl
          - sp
          - skt
          - tcw
          - ci
          - sst
        grid: O96

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.3D_6hourly
        param:
          - q
          - t
          - u
          - v
          - w
          - z
        levelist:
          - 1000
          - 925
          - 850
          - 700
          - 600
          - 500
          - 400
          - 300
          - 250
          - 200
          - 150
          - 100
          - 50
        grid: O96

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.2D_6hourly_accumulated
        param:
          - tp
          - cp
        grid: O96
        # TODO: Check with colleagues — de-accumulation needed? See TODO.md

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: ocean.gr025.2D_daily_avg_1950-2014
        param:
          - avg_tos
          - avg_zos
          - avg_siconc
        grid: O96

    - constants:
        template: "${input.join.0.eeriecloud}"
        param:
          - cos_latitude
          - sin_latitude
          - cos_longitude
          - sin_longitude
          - cos_julian_day
          - sin_julian_day
          - cos_local_time
          - sin_local_time
          - insolation

output:
  flatten_grid: true
  order_by: [valid_datetime, param_level]
  remapping:
    param_level: "{param}_{levelist}"
