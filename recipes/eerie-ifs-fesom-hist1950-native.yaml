# Native TCo1279 atmosphere — no regridding
# For use when you want data on the original EERIE native grid

name: eerie-ifs-fesom-hist1950-native

dates:
  start: "1970-01-01T06:00:00"
  end: "2014-12-31T18:00:00"
  frequency: 6h

input:
  join:
    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.native.2D_6hourly_instant
        param:
          - 10u
          - 10v
          - 2d
          - 2t
          - msl
          - sp
          - skt
          - tcw
          - ci
          - sst

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.native.3D_6hourly
        param:
          - q
          - t
          - u
          - v
          - w
          - z
        levelist:
          - 1000
          - 925
          - 850
          - 700
          - 600
          - 500
          - 400
          - 300
          - 250
          - 200
          - 150
          - 100
          - 50

    - constants:
        template: "${input.join.0.eeriecloud}"
        param:
          - cos_latitude
          - sin_latitude
          - cos_longitude
          - sin_longitude
          - cos_julian_day
          - sin_julian_day
          - cos_local_time
          - sin_local_time
          - insolation

output:
  flatten_grid: true
  order_by: [valid_datetime, param_level]
  remapping:
    param_level: "{param}_{levelist}"
