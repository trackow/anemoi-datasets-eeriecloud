# Quick test recipe — 24 timesteps, 3 levels, surface vars only
# For fast iteration and verifying the plugin works end-to-end

name: eerie-ifs-fesom-hist1950-test

dates:
  start: "1970-01-01T06:00:00"
  end: "1970-01-07T00:00:00"
  frequency: 6h

input:
  join:
    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.2D_6hourly_instant
        param:
          - 10u
          - 10v
          - 2t
          - msl
          - sp
        grid: O96

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.3D_6hourly
        param:
          - t
          - u
          - z
        levelist:
          - 1000
          - 500
          - 250
        grid: O96

    - constants:
        template: "${input.join.0.eeriecloud}"
        param:
          - cos_latitude
          - sin_latitude
          - cos_longitude
          - sin_longitude
          - cos_julian_day
          - sin_julian_day
          - cos_local_time
          - sin_local_time
          - insolation

output:
  flatten_grid: true
  order_by: [valid_datetime, param_level]
  remapping:
    param_level: "{param}_{levelist}"
