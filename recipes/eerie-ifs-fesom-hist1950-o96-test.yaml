# Short O96 test — single timestep, all source types
# Tests: 2D instant + 3D + accumulated + ocean + constants, all joined

name: eerie-ifs-fesom-hist1950-o96-test

dates:
  start: "1970-01-01T06:00:00"
  end: "1970-01-01T06:00:00"
  frequency: 6h

input:
  join:
    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.2D_6hourly_instant
        param:
          - 10u
          - 10v
          - 2d
          - 2t
          - msl
          - sp
          - skt
          - tcw
          - ci
          - sst
        grid: O96

    - eeriecloud:
        dataset: eerie-ifs-fesom-hist-1950
        item: atmos.gr025.3D_6hourly
        param:
          - q
          - t
          - u
          - v
          - w
          - z
        levelist:
          - 1000
          - 925
          - 850
          - 700
          - 600
          - 500
          - 400
          - 300
          - 250
          - 200
          - 150
          - 100
          - 50
        grid: O96

    # TODO: accumulated fields (tp, cp) have offset timestamps (03, 09, 15, 21)
    # TODO: ocean daily averages need time resampling + grid reshape

    - constants:
        template: "${input.join.0.eeriecloud}"
        param:
          - cos_latitude
          - sin_latitude
          - cos_longitude
          - sin_longitude
          - cos_julian_day
          - sin_julian_day
          - cos_local_time
          - sin_local_time
          - insolation

output:
  flatten_grid: true
  order_by: [valid_datetime, param_level]
  remapping:
    param_level: "{param}_{levelist}"
